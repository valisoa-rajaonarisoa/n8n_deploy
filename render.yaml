services:
  - type: web
    name: n8n
    env: docker
    region: frankfurt
    plan: free
    branch: main
    numInstances: 1
    # 👇 CORRECTION : C'est dockerPort et non port pour les environnements Docker
    # dockerPort: 5678
    healthCheckPath: /healthz
    envVars:
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: n8nDB
          property: host
      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: n8nDB
          property: database
      - key: DB_POSTGRESDB_PORT
        fromDatabase:
          name: n8nDB
          property: port
      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: n8nDB
          property: user
      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: n8nDB
          property: password

      # 👇 STABILISATION DE LA BASE DE DONNÉES (Évite les timeouts au démarrage)
      - key: DB_POSTGRESDB_TIMEOUT
        value: "60000"
      - key: DB_POSTGRESDB_CONNECTION_TIMEOUT
        value: "60000"

      # 👇 REGLAGES MÉMOIRE & RESEAU (Empêche le crash RAM)
      - key: NODE_OPTIONS
        value: --max-old-space-size=340
      - key: N8N_PORT
        value: "5678"
      - key: PORT
        value: "5678"
      - key: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
        value: "false"

      # Vos autres configurations d'environnement
      - key: N8N_LOG_LEVEL
        value: info
      - key: GENERIC_TIMEZONE
        value: Europe/Paris
      - key: TZ
        value: Europe/Paris
      - key: N8N_DEFAULT_LOCALE
        value: fr
      - key: N8N_ENCRYPTION_KEY
        generateValue: true 

      # 👇 Modifiable directement via l'interface Render après le premier build
      - key: WEBHOOK_URL
        value: CHANGE_ME

databases:
  - name: n8nDB
    region: frankfurt
    plan: free